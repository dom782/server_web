<!DOCTYPE html>
<html>

<body>

<h2>Test comunicazione</h2>

<input id="msg" placeholder="scrivi messaggio">
<button onclick="send()">Invia</button>

<div id="chat"></div>

<script>

let ws = new WebSocket("wss://" + location.host + "/ws/web")

ws.onmessage = (event)=>{
    document.getElementById("chat").innerHTML +=
        "<p>"+event.data+"</p>"
}

function send(){

    let msg = document.getElementById("msg").value
    ws.send(msg)

}

</script>

</body>
</html>
