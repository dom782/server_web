<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinkPC – Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --accent2: #7c6af7;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --msg-me: #1a2a3a;
    --msg-pc: #1a1a2e;
    --msg-sys: #111118;
    --radius: 16px;
  }

  html, body {
    height: 100%; 
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    padding: 16px 20px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-info { flex: 1; }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.4s;
    flex-shrink: 0;
  }
  .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.pc-on { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  /* SETUP PANEL */
  #setup {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 20px;
  }

  #setup h2 { font-size: 22px; font-weight: 600; text-align: center; }
  #setup p { font-size: 14px; color: var(--text-dim); text-align: center; line-height: 1.5; }

  .input-group { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .input-group label { font-size: 12px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .btn-connect {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-connect:active { transform: scale(0.98); opacity: 0.9; }

  /* CHAT */
  #chat { flex: 1; display: none; flex-direction: column; }
  #chat.visible { display: flex; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-me {
    background: var(--msg-me);
    border: 1px solid #1e3a5a;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg-from {
    background: var(--msg-pc);
    border: 1px solid #1e1e3a;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg-sys {
    background: var(--msg-sys);
    border: 1px solid var(--border);
    align-self: center;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    padding: 6px 12px;
    border-radius: 20px;
  }

  .msg-sender {
    font-size: 10px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    margin-bottom: 3px;
    font-weight: 500;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* STATUS BAR */
  #statusBar {
    padding: 8px 16px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }

  .sb-item { display: flex; align-items: center; gap: 5px; }
  .sb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
  .sb-dot.on { background: var(--accent); }
  .sb-dot.pc { background: var(--accent2); }

  /* INPUT AREA */
  #inputArea {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #msgInput {
    flex: 1;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #msgInput:focus { border-color: var(--accent); }

  #sendBtn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  #sendBtn:active { transform: scale(0.93); }
  #sendBtn svg { width: 20px; height: 20px; fill: white; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">⚡</div>
    <div class="header-info">
      <div class="header-title">LinkPC</div>
      <div class="header-sub" id="headerSub">non connesso</div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <!-- SETUP -->
  <div id="setup">
    <h2>Connetti al tuo PC</h2>
    <p>Inserisci il tuo nome e connettiti al server relay per chattare con il PC sulla rete privata.</p>
    <div class="input-group">
      <label>IL TUO NOME</label>
      <input type="text" id="nameInput" placeholder="es. Mario" maxlength="20" />
    </div>
    <button class="btn-connect" onclick="connect()">Connetti →</button>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="messages"></div>
    <div id="statusBar">
      <div class="sb-item">
        <div class="sb-dot on" id="sbServer"></div>
        <span id="sbServerTxt">server</span>
      </div>
      <div class="sb-item">
        <div class="sb-dot pc" id="sbPc"></div>
        <span id="sbPcTxt">pc offline</span>
      </div>
    </div>
    <div id="inputArea">
      <textarea id="msgInput" placeholder="Scrivi un messaggio..." rows="1"></textarea>
      <button id="sendBtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  let ws = null;
  let myName = '';

  // Auto-resize textarea
  const msgInput = document.getElementById('msgInput');
  msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  function connect() {
    const nameInput = document.getElementById('nameInput');
    myName = nameInput.value.trim() || 'Telefono';
    
    // Determina URL WebSocket
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${location.host}?type=phone&name=${encodeURIComponent(myName)}`;

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      document.getElementById('setup').style.display = 'none';
      document.getElementById('chat').classList.add('visible');
      document.getElementById('statusDot').classList.add('connected');
      document.getElementById('headerSub').textContent = myName;
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    };

    ws.onclose = () => {
      appendSystem('🔌 Disconnesso dal server');
      document.getElementById('statusDot').classList.remove('connected');
      document.getElementById('headerSub').textContent = 'disconnesso';
    };

    ws.onerror = () => {
      appendSystem('❌ Errore connessione');
    };
  }

  function handleMessage(msg) {
    if (msg.type === 'status') {
      const pcDot = document.getElementById('sbPc');
      const pcTxt = document.getElementById('sbPcTxt');
      if (msg.pcConnected) {
        pcDot.classList.add('on');
        pcTxt.textContent = 'pc online';
      } else {
        pcDot.classList.remove('on');
        pcTxt.textContent = 'pc offline';
      }
      return;
    }
    
    if (msg.type === 'system') { appendSystem(msg.text); return; }
    if (msg.type === 'echo') { return; } // già mostrato
    
    appendFrom(msg.from || 'PC', msg.text, msg.timestamp);
  }

  function sendMsg() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    
    ws.send(JSON.stringify({ type: 'message', text }));
    appendMe(text);
    msgInput.value = '';
    msgInput.style.height = 'auto';
  }

  function appendMe(text) {
    const div = document.createElement('div');
    div.className = 'msg msg-me';
    div.innerHTML = `<div>${escHtml(text)}</div><div class="msg-time">${time()}</div>`;
    addMsg(div);
  }

  function appendFrom(from, text, ts) {
    const div = document.createElement('div');
    div.className = 'msg msg-from';
    div.innerHTML = `<div class="msg-sender">${escHtml(from)}</div><div>${escHtml(text)}</div><div class="msg-time">${fmtTime(ts)}</div>`;
    addMsg(div);
  }

  function appendSystem(text) {
    const div = document.createElement('div');
    div.className = 'msg msg-sys';
    div.textContent = text;
    addMsg(div);
  }

  function addMsg(el) {
    const msgs = document.getElementById('messages');
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function time() { return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }); }
  function fmtTime(ts) { return ts ? new Date(ts).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }) : time(); }
  function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
